<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Prompt</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .confirmation { max-width: 500px; margin: auto; padding: 20px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Delete Prompt</h1>
    <div class="confirmation">
        <p>Are you sure you want to delete the prompt: "<strong>{{ prompt.prompt_name }}</strong>"?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit">Yes, Delete</button>
        </form>
        <br>
        <a href="{% url 'view_prompt' %}">Cancel</a>
    </div>
</body>
</html>
